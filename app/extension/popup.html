<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>iStudy AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 500px;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; color: #666; margin-top: 2px; }
    .section { padding: 12px 16px; border-bottom: 1px solid #1a1a1a; }
    label { display: block; font-size: 11px; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    textarea {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      color: #fff;
      padding: 10px;
      font-size: 12px;
      resize: none;
      outline: none;
      font-family: inherit;
    }
    textarea:focus { border-color: #3b82f6; }
    .subject-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .subject-btn {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #222;
      background: #111;
      color: #888;
      font-size: 11px;
      cursor: pointer;
    }
    .subject-btn.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
    .mode-grid {
      display: flex;
      gap: 6px;
    }
    .mode-btn {
      flex: 1;
      padding: 8px 6px;
      border-radius: 8px;
      border: 1px solid #222;
      background: #111;
      color: #888;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
    }
    .mode-btn.active {
      background: #7c3aed;
      color: #fff;
      border-color: #7c3aed;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-blue { background: #2563eb; color: #fff; }
    .btn-purple { background: #7c3aed; color: #fff; }
    .btn-orange { background: #ea580c; color: #fff; }
    .result-box {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.6;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .score-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .score-card {
      flex: 1;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .score-card .val { font-size: 18px; font-weight: 700; }
    .score-card .lbl { font-size: 10px; color: #666; margin-top: 2px; }
    .green { color: #4ade80; }
    .yellow { color: #facc15; }
    .red { color: #f87171; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 10px;
      margin: 2px;
    }
    .tag-blue { background: #1e3a5f; color: #93c5fd; border: 1px solid #1e40af; }
    .tag-green { background: #14532d; color: #86efac; border: 1px solid #166534; }
    .error { color: #f87171; font-size: 12px; padding: 8px 16px; }
    .loading { color: #666; font-size: 12px; padding: 8px 16px; }
    #capture-btn {
      background: #111;
      border: 1px solid #333;
      color: #888;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    #capture-btn:hover { border-color: #555; color: #fff; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>iStudy AI</h1>
    <p>Examiner-level feedback</p>
  </div>
  <button id="capture-btn">📋 Capture</button>
</div>

<!-- SUBJECT -->
<div class="section">
  <label>Subject</label>
  <div class="subject-grid" id="subject-grid">
    <button class="subject-btn active" data-subject="Economics">Economics</button>
    <button class="subject-btn" data-subject="Business">Business</button>
    <button class="subject-btn" data-subject="Physics">Physics</button>
    <button class="subject-btn" data-subject="Maths">Maths</button>
    <button class="subject-btn" data-subject="History">History</button>
    <button class="subject-btn" data-subject="Psychology">Psychology</button>
  </div>
</div>

<!-- QUESTION -->
<div class="section">
  <label>Exam Question</label>
  <textarea id="question" rows="3" placeholder="Paste exam question here..."></textarea>
</div>

<!-- ANSWER -->
<div class="section">
  <label>Your Answer</label>
  <textarea id="answer" rows="4" placeholder="Paste your answer here..."></textarea>
</div>

<!-- STUDY MODE -->
<div class="section">
  <label>Study Mode</label>
  <div class="mode-grid">
    <button class="mode-btn active" data-mode="socratic">🧭 Guide Me</button>
    <button class="mode-btn" data-mode="scaffold">🧱 Base</button>
    <button class="mode-btn" data-mode="exam_drill">🎯 Drill</button>
  </div>
  <div style="margin-top: 8px; display: flex; gap: 6px;">
    <button class="btn btn-purple" id="study-btn" style="padding: 8px;">Ask Study Mode</button>
    <button class="btn btn-orange" id="trust-btn" style="padding: 8px;">Trust Check</button>
  </div>
  <div id="study-result" style="margin-top: 8px; display: none;">
    <div class="result-box" id="study-text"></div>
  </div>
</div>

<!-- EVALUATE -->
<div class="section">
  <button class="btn btn-blue" id="evaluate-btn">Get Examiner Feedback</button>
</div>

<!-- OUTPUT -->
<div id="output" style="padding: 12px 16px; display: none;"></div>
<div id="error" class="error" style="display: none;"></div>
<div id="loading" class="loading" style="display: none;">Processing...</div>

<script src="popup.js"></script>
</body>
</html>
